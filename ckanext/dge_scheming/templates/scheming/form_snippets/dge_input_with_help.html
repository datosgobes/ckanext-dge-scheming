{% import 'macros/form.html' as form %}

<div class="control-group {% if errors.get(field.field_name) %}error{% endif %}">
    <label class="control-label" for="field-{{ field.field_name }}">
        {{ h.scheming_language_text(field.label) }}
        
        {# Icono de ayuda (?) #}
        {%- snippet 'scheming/form_snippets/dge_help_popover.html', field=field -%}
    </label>
    
    <div class="controls">
        <input 
            id="field-{{ field.field_name }}"
            type="text"
            name="{{ field.field_name }}"
            value="{{ data.get(field.field_name, '') }}"
            placeholder="{{ h.scheming_language_text(field.form_placeholder) if field.form_placeholder else '' }}"
            pattern="^$|^[0-9]+$"
            inputmode="numeric"
            oninput="
                if (this.value === '') {
                    this.setCustomValidity('');
                } else if (!/^[0-9]+$/.test(this.value)) {
                    this.setCustomValidity('Debe ser un número entero positivo');
                } else {
                    this.setCustomValidity('');
                }
            "
            oninvalid="this.setCustomValidity('Debe ser un número entero positivo')"
            onblur="this.setCustomValidity('')"
        />
        
        {% if errors.get(field.field_name) %}
            <span class="help-inline">
                {{ errors.get(field.field_name) }}
            </span>
        {% endif %}
        
        {# Help text debajo #}
        {%- snippet 'scheming/form_snippets/help_text.html', field=field -%}
    </div>
</div>
